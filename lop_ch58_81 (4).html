ulin. But on calm days when the sun was not too harsh and on calm\nnights, he came out. One of his favourite positions in the open was lying on the stern\nbench on his side, stomach overhanging the edge of it, front and back legs extending\ndown the side benches. It was a lot of tiger to squeeze onto a fairly narrow ledge, but he\nmanaged it by making his back very round. When he was truly sleeping, he laid his head\non his front legs, but when his mood was slightly more active, when he might choose to\nopen his eyes and look about, he turned his head and lay his chin on the gunnel.\nAnother favourite position of his was sitting with his back to me, his rear half resting on\nthe floor of the boat and his front half on the bench, his face buried into the stern, paws\nright next to his head, looking as if we were playing hide-and-seek and he were the one\ncounting. In this position he tended to lie very still, with only the occasional twitching of\nhis ears to indicate that he was not necessarily sleeping."]}, {"num": 69, "paragraphs": ["On many nights I was convinced I saw a light in the distance. Each time I set off a flare.\nWhen I had used up the rocket flares, I expended the hand flares. Were they ships that\nfailed to see me? The light of rising or setting stars bouncing off the ocean? Breaking\nwaves that moonlight and forlorn hope fashioned into illusion? Whatever the case, every", "time it was for nothing. Never a result. Always the bitter emotion of hope raised and\ndashed. In time I gave up entirely on being saved by a ship. If the horizon was two and a\nhalf miles away at an altitude of five feet, how far away was it when I was sitting against\nthe mast of my raft, my eyes not even three feet above the water? What chance was there\nthat a ship crossing the whole great big Pacific would cut into such a tiny circle? Not only\nthat: that it would cut into such a tiny circle and see me—what chance was there of that?\nNo, humanity and its unreliable ways could not be counted upon. It was land I had to\nreach, hard, firm, certain land.\nI remember the smell of the spent hand-flare shells. By some freak of chemistry they\nsmelled exactly like cumin. It was intoxicating. I sniffed the plastic shells and\nimmediately Pondicherry came to life in my mind, a marvellous relief from the\ndisappointment of calling for help and not being heard. The experience was very strong,\nnearly a hallucination. From a single smell a whole town arose. (Now, when I smell\ncumin, I see the Pacific Ocean.)\nRichard Parker always froze when a hand flare hissed to life. His eyes, round pupils the\nsize of pinpricks, fixed on the light steadily. It was too bright for me, a blinding white\ncentre with a pinkish red aureole. I had to turn away. I held the flare in the air at arm's\nlength and waved it slowly. For about a minute heat showered down upon my forearm\nand everything was weirdly lit. Water around the raft, until a moment before opaquely\nblack, showed itself to be crowded with fish."]}, {"num": 70, "paragraphs": ["Butchering a turtle was hard work. My first one was a small hawksbill. It was its blood\nthat tempted me, the \"good, nutritious, salt-free drink\" promised by the survival manual.\nMy thirst was that bad. I took hold of the turtle's shell and grappled with one of its back\nflippers. When I had a good grip, I turned it over in the water and attempted to pull it\nonto the raft. The thing was thrashing violently. I would never be able to deal with it on\nthe raft. Either I let it go—or I tried my luck on the lifeboat. I looked up. It was a hot and\ncloudless day. Richard Parker seemed to tolerate my presence at the bow on such days,\nwhen the air was like the inside of an oven and he did not move from under the tarpaulin\nuntil sunset.\nI held on to one of the turtle's back flippers with one hand and I pulled on the rope to the\nlifeboat with the other. It was not easy climbing aboard. When I had managed it, I jerked\nthe turtle in the air and brought it onto its back on the tarpaulin. As I had hoped, Richard\nParker did no more than growl once or twice. He was not up to exerting himself in such\nheat.\nMy determination was grim and blind. I felt I had no time to waste. I turned to the\nsurvival manual as to a cookbook. It said to lay the turtle on its back. Done. It advised", "that a knife should be \"inserted into the neck\" to sever the arteries and veins running\nthrough it. I looked at the turtle. There was no neck. The turtle had retracted into its shell;\nall that showed of its head was its eyes and its beak, surrounded by circles of skin. It was\nlooking at me upside down with a stern expression. I took hold of the knife and, hoping\nto goad it, poked a front flipper. It only shrank further into its shell. I decided on a more\ndirect approach. As confidently as if I had done it a thousand times, I jammed the knife\njust to the right of the turtle's head, at an angle. I pushed the blade deep into the folds of\nskin and twisted it. The turtle retreated even further, favouring the side where the blade\nwas, and suddenly shot its head forward, beak snapping at me viciously. I jumped back.\nAll four flippers came out and the creature tried to make its getaway. It rocked on its back,\nflippers beating wildly and head shaking from side to side. I took hold of a hatchet and\nbrought it down on the turtle's neck, gashing it. Bright red blood shot out. I grabbed the\nbeaker and collected about three hundred millilitres, a pop can's worth. I might have got\nmuch more, a litre I would guess, but the turtle's beak was sharp and its front flippers\nwere long and powerful, with two claws on each. The blood I managed to collect gave off\nno particular smell. I took a sip. It tasted warm and animal, if my memory is right. It's\nhard to remember first impressions. I drank the blood to the last drop.\nI thought I would use the hatchet to remove the tough belly shell, but it proved easier\nwith the sawtoothed edge of the knife. I set one foot at the centre of the shell, the other\nclear of the flailing flippers. The leathery skin at the head end of the shell was easy\ncutting, except around the flippers. Sawing away at the rim, however, where shell met\nshell, was very hard work, especially as the turtle wouldn't stop moving. By the time I\nhad gone all the way around I was bathed in sweat and exhausted. I pulled on the belly\nshell. It lifted reluctantly, with a wet sucking sound. Inner life was revealed, twitching\nand jerking— muscles, fat, blood, guts and bones. And still the turtle thrashed about. I\nslashed its neck to the vertebrae. It made no difference. Flippers continued to beat. With\ntwo blows of the hatchet I cut its head right off. The flippers did not stop. Worse, the\nseparated head went on gulping for air and blinking its eyes. I pushed it into the sea. The\nliving rest of the turtle I lifted and dropped into Richard Parkers territory. He was making\nnoises and sounded as if he were about to stir. He had probably smelled the turtle's blood.\nI fled to the raft.\nI watched sullenly as he loudly appreciated my gift and made a joyous mess of himself. I\nwas utterly spent. The effort of butchering the turtle had hardly seemed worth the cup of\nblood.\nI started thinking seriously about how I was going to deal with Richard Parker. This\nforbearance on his part on hot, cloudless days, if that is what it was and not simple\nlaziness, was not good enough. I couldn't always be running away from him. I needed\nsafe access to the locker and the top of the tarpaulin, no matter the time of day or the\nweather, no matter his mood. It was rights I needed, the sort of rights that come with\nmight.\nIt was time to impose myself and carve out my territory."]}, {"num": 72, "paragraphs": ["In my case, to protect myself from Richard Parker while I trained him, I made a shield\nwith a turtle shell. I cut a notch on each side of the shell and connected them with a\nlength of rope. The shield was heavier than I would have liked, but do soldiers ever get to\nchoose their ordnance?", "The first time I tried, Richard Parker bared his teeth, rotated his ears full round, vomited a\nshort guttural roar and charged. A great, full-clawed paw rose in the air and cuffed my\nshield. The blow sent me flying off the boat. I hit the water and instantly let go of the\nshield. It sank without a trace after hitting me in the shin. I was beside myself with\nterror—of Richard Parker, but also of being in the water. In my mind a shark was at that\nvery second shooting up for me. I swam for the raft in frantic strokes, precisely the sort of\nwild thrashing that sharks find so deliciously inviting. Luckily there were no sharks. I\nreached the raft, let out all the rope and sat with my arms wrapped around my knees and\nmy head down, trying to put out the fire of fear that was blazing within me. It was a long\ntime before the trembling of my body stopped completely. I stayed on the raft for the rest\nof that day and the whole night. I did not eat or drink.\nI was at it again next time I caught a turtle. Its shell was smaller, lighter, and made for a\nbetter shield. Once more I advanced and started stamping on the middle bench with my\nfoot.\nI wonder if those who hear this story will understand that my behaviour was not an act of\ninsanity or a covert suicide attempt but a simple necessity. Either I tamed him, made him\nsee who was Number One and who was Number Two-or I died the day I wanted to climb\naboard the lifeboat during rough weather and he objected.\nIf I survived my apprenticeship as a high seas animal trainer it was because Richard\nParker did not really want to attack me. Tigers, indeed all animals, do not favour violence\nas a means of settling scores. When animals fight, it is with the intent to kill and with the\nunderstanding that they may be killed. A clash is costly. And so animals have a full\nsystem of cautionary signals designed to avoid a showdown, and they are quick to back\ndown when they feel they can. Rarely will a tiger attack a fellow predator without\nwarning. Typically a head-on rush for the adversary will be made, with much snarling\nand growling. But just before it is too late, the tiger will freeze, the menace rumbling\ndeep in its throat. It will appraise the situation. If it decides that there is no threat, it will\nturn away, feeling that its point has been made.\nRichard Parker made his point with me four times. Four times he struck at me with his\nright paw and sent me overboard, and four times I lost my shield. I was terrified before,\nduring and after each attack, and I spent a long time shivering with fear on the raft.\nEventually I learned to read the signals he was sending me. I found that with his ears, his\neyes, his whiskers, his teeth, his tail and his throat, he spoke a simple, forcefully\npunctuated language that told me what his next move might be. I learned to back down\nbefore he lifted his paw in the air.\nThen I made my point, feet on the gunnel, boat rolling, my single-note language blasting\nfrom the whistle, and Richard Parker moaning and gasping at the bottom of the boat.\nMy fifth shield lasted me the rest of his training."]}, {"num": 73, "paragraphs": ["My greatest wish—other than salvation—was to have a book. A long book with a neverending story. One I could read again and again, with new eyes and a fresh understanding\neach time. Alas, there was no scripture in the lifeboat. I was a disconsolate Arjuna in a\nbattered chariot without the benefit of Krishna's words. The first time I came upon a\nBible in the bedside table of a hotel room in Canada, I burst into tears. I sent a\ncontribution to the Gideons the very next day, with a note urging them to spread the\nrange of their activity to all places where worn and weary travellers might lay down their\nheads, not just to hotel rooms, and that they should leave not only Bibles, but other sacred\nwritings as well. I cannot think of a better way to spread the faith. No thundering from a\npulpit, no condemnation from bad churches, no peer pressure, just a book of scripture\nquietly waiting to say hello, as gentle and powerful as a little girl's kiss on your cheek.\nAt the very least, if I had had a good novel! But there was only the survival manual,\nwhich I must have read ten thousand times over the course of my ordeal.\nI kept a diary. It's hard to read. I wrote as small as I could. I was afraid I would run out of\npaper. There's not much to it. Words scratched on a page trying to capture a reality that\noverwhelmed me. I started it a week or so after the sinking of the Tsimtsum. Before that I\nwas too busy and scattered. The entries are not dated or numbered. What strikes me now\nis how time is captured. Several days, several weeks, all on one page. I talked about what\nyou might expect: about things that happened and how I felt, about what I caught and\nwhat I didn't, about seas and weather, about problems and solutions, about Richard\nParker. All very practical stuff."]}, {"num": 74, "paragraphs": ["I practised religious rituals that I adapted to the circumstances—solitary Masses without\npriests or consecrated Communion hosts, darshans without murtis, and pujas with turtle\nmeat for prasad, acts of devotion to Allah not knowing where Mecca was and getting my\nArabic wrong. They brought me comfort, that is certain. But it was hard, oh, it was hard.\nFaith in God is an opening up, a letting go, a deep trust, a free act of love—but\nsometimes it was so hard to love. Sometimes my heart was sinking so fast with anger,\ndesolation and weariness, I was afraid it would sink to the very bottom of the Pacific and\nI would not be able to lift it back up.\nAt such moments I tried to elevate myself. I would touch the turban I had made with the\nremnants of my shirt and I would say aloud, \"THIS IS GOD'S HAT!\"", "I would pat my pants and say aloud, \"THIS IS GOD'S ATTIRE!\" I would point to\nRichard Parker and say aloud, \"THIS IS GOD'S CAT!\"\nI would point to the lifeboat and say aloud, \"THIS IS GOD'S ARK!\"\nI would spread my hands wide and say aloud, \"THESE ARE GOD'S WIDE ACRES!\"\nI would point at the sky and say aloud, \"THIS IS GOD'S EAR!\"\nAnd in this way I would remind myself of creation and of my place in it.\nBut God's hat was always unravelling. God's pants were falling apart. God's cat was a\nconstant danger. God's ark was a jail. God's wide acres were slowly killing me. God's ear\ndidn't seem to be listening.\nDespair was a heavy blackness that let no light in or out. It was a hell beyond expression.\nI thank God it always passed. A school of fish appeared around the net or a knot cried out\nto be reknotted. Or I thought of my family, of how they were spared this terrible agony.\nThe blackness would stir and eventually go away, and God would remain, a shining point\nof light in my heart. I would go on loving."]}, {"num": 75, "paragraphs": ["On the day when I estimated it was Mother's birthday, I sang \"Happy Birthday\" to her out\nloud."]}, {"num": 76, "paragraphs": ["I got into the habit of cleaning up after Richard Parker. As soon as I became aware that\nhe had had a bowel movement, I went about getting to it, a risky operation involving\nnudging his feces my way with the gaff and reaching for them from the tarpaulin. Feces\ncan be infected with parasites. This does not matter with animals in the wild since they\nrarely spend any time next to their feces and mostly have a neutral relationship to them;\ntree dwellers hardly see them at all and land animals normally excrete and move on. In\nthe compact territory of a zoo, however, the case is quite different, and to leave feces in\nan animal's enclosure is to invite reinfection by encouraging the animal to eat them,\nanimals being gluttons for anything that remotely resembles food. That is why enclosures\nare cleaned, out of concern for the intestinal health of animals, not to spare the eyes and\nnoses of visitors. But upholding the Patel family's reputation for high standards in\nzookeeping was not my concern in the case at hand. In a matter of weeks Richard Parker", "became constipated and his bowel movements came no more than once a month, so my\ndangerous janitoring was hardly worth it from a sanitary point of view. It was for another\nreason that I did it: it was because the first time Richard Parker relieved himself in the\nlifeboat, I noticed that he tried to hide the result. The significance of this was not lost on\nme. To display his feces openly, to flaunt the smell of them, would have been a sign of\nsocial dominance. Conversely, to hide them, or try to, was a sign of deference—of\ndeference to me.\nI could tell that it made him nervous. He stayed low, his head cocked back and his ears\nflat to the sides, a quiet, sustained growl coming from him. I proceeded with exceptional\nalertness and deliberation, not only to preserve my life but also to give him the right\nsignal. The right signal was that when I had his feces in my hand, I rolled them about for\nsome seconds, brought them close to my nose and sniffed them loudly, and swung my\ngaze his way a few times in a showy manner, glaring at him wide-eyed (with fear, if only\nhe knew) long enough to give him the willies, but not so long as to provoke him. And\nwith each swing of my gaze, I blew in a low, menacing way in the whistle. By doing this,\nby badgering him with my eyes (for, of course, with all animals, including us, to stare is\nan aggressive act) and by sounding that whistle cry that had such ominous associations in\nhis mind, I made clear to Richard Parker that it was my right, my lordly right, to fondle\nand sniff his feces if I wanted to. So you see, it was not good zookeeping I was up to, but\npsychological bullying. And it worked. Richard Parker never stared back; his gaze always\nfloated in midair, neither on me nor off me. It was something I could feel as much as I\nfelt his balls of excrement in my hand: mastery in the making. The exercise always left\nme utterly drained from the tension, yet exhilarated.\nSince we are on the subject, I became as constipated as Richard Parker. It was the result\nof our diet, too little water and too much protein. For me, relieving myself, also a\nmonthly act, was hardly that. It was a long-drawn, arduous and painful event that left me\nbathing in sweat and helpless with exhaustion, a trial worse than a high fever."]}, {"num": 77, "paragraphs": ["As the cartons of survival rations diminished, I reduced my intake till I was following\ninstructions exactly, holding myself to only two biscuits every eight hours. I was\ncontinuously hungry. I thought about food obsessively. The less I had to eat, the larger\nbecame the portions I dreamed of. My fantasy meals grew to be the size of India. A\nGanges of dhal soup. Hot chapattis the size of Rajasthan. Bowls of rice as big as Uttar\nPradesh. Sambars to flood all of Tamil Nadu. Ice cream heaped as high as the Himalayas.\nMy dreaming became quite expert: all ingredients for my dishes were always in fresh and\nplentiful supply; the oven or frying pan was always at just the right temperature; the\nproportion of things was always bang on; nothing was ever burnt or undercooked,\nnothing too hot or too cold. Every meal was simply perfect—only just beyond the reach\nof my hands.", "By degrees the range of my appetite increased. Whereas at first I gutted fish and peeled\ntheir skin fastidiously, soon I no more than rinsed off their slimy slipperiness before\nbiting into them, delighted to have such a treat between my teeth. I recall flying fish as\nbeing quite tasty, their flesh rosy white and tender. Dorado had a firmer texture and a\nstronger taste. I began to pick at fish heads rather than toss them to Richard Parker or use\nthem as bait. It was a great discovery when I found that a fresh-tasting fluid could be\nsucked out not only from the eyes of larger fish but also from their vertebrae. Turtles—\nwhich previously I had roughly opened up with the knife and tossed onto the floor of the\nboat for Richard Parker, like a bowl of hot soup—became my favourite dish.\nIt seems impossible to imagine that there was a time when I looked upon a live sea turtle\nas a ten-course meal of great delicacy, a blessed respite from fish. Yet so it was. In the\nveins of turtles coursed a sweet lassi that had to be drunk as soon as it spurted from their\nnecks, because it coagulated in less than a minute. The best poriyals and kootus in the\nland could not rival turtle flesh, either cured brown or fresh deep red. No cardamom\npayasam I ever tasted was as sweet or as rich as creamy turtle eggs or cured turtle fat. A\nchopped-up mixture of heart, lungs, liver, flesh and cleaned-out intestines sprinkled with\nfish parts, the whole soaked in a yolk-and-serum gravy, made an unsurpassable, fingerlicking thali. By the end of my journey I was eating everything a turtle had to offer. In the\nalgae that covered the shells of some hawksbills I sometimes found small crabs and\nbarnacles. Whatever I found in a turtle's stomach became my turn to eat. I whiled away\nmany a pleasant hour gnawing at a flipper joint or splitting open bones and licking out\ntheir marrow. And my fingers were forever picking away at bits of dry fat and dry flesh\nthat clung to the inner sides of shells, rummaging for food in the automatic way of\nmonkeys.\nTurtle shells were very handy. I couldn't have done without them. They served not only\nas shields, but as cutting boards for fish and as bowls for mixing food. And when the\nelements had destroyed the blankets beyond repair, I used the shells to\nprotect myself from the sun by propping them against each other and lying beneath them.\nIt was frightening, the extent to which a full belly made for a good mood. The one would\nfollow the other measure for measure: so much food and water, so much good mood. It\nwas such a terribly fickle existence. I was at the mercy of turtle meat for smiles.\nBy the time the last of the biscuits had disappeared, anything was good to eat, no matter\nthe taste. I could put anything in my mouth, chew it and swallow it—delicious, foul or\nplain—so long as it wasn't salty. My body developed a revulsion for salt that I still\nexperience to this day.\nI tried once to eat Richard Parker's feces. It happened early on, when my system hadn't\nlearned yet to live with hunger and my imagination was still wildly searching for\nsolutions. I had delivered fresh solar-still water to his bucket not long before. After\ndraining it in one go, he had disappeared below the tarpaulin and I had returned to\nattending to some small matter in the locker. As I always did in those early days, I", "glanced below the tarpaulin every so often to make sure he wasn't up to something. Well,\nthis one time, lo, he was. He was crouched, his back was rounded and his rear legs were\nspread. His tail was raised, pushing up against the tarpaulin. The position was tell-tale.\nRight away I had food in mind, not animal hygiene. I decided there was little danger. He\nwas turned the other way and his head was out of sight. If I respected his peace and quiet,\nhe might not even notice me. I grabbed a bailing cup and stretched my arm forward. My\ncup arrived in the nick of time. At the second it was in position at the base of his tail,\nRichard Parker's anus distended, and out of it, like a bubble-gum balloon, came a black\nsphere of excrement. It fell into my cup with a clink, and no doubt I will be considered to\nhave abandoned the last vestiges of humanness by those who do not understand the\ndegree of my suffering when I say that it sounded to my ears like the music of a fiverupee coin dropped into a beggar's cup. A smile cracked my lips and made them bleed. I\nfelt deep gratitude towards Richard Parker. I pulled back the cup. I took the turd in my\nfingers. It was very warm, but the smell was not strong. In size it was like a big ball of\ngulab jamun, but with none of the softness. In fact, it was as hard as a rock. Load a\nmusket with it and you could have shot a rhino.\nI returned the ball to the cup and added a little water. I covered it and set it aside. My\nmouth watered as I waited. When I couldn't stand the wait any longer, I popped the ball\ninto my mouth. I couldn't eat it. The taste was acrid, but it wasn't that. It was rather my\nmouth's conclusion, immediate and obvious: there's nothing to be had here. It was truly\nwaste matter, with no nutrients in it. I spat it out and was bitter at the loss of precious\nwater. I took the gaff and went about collecting the rest of Richard Parker's feces. They\nwent straight to the fish.\nAfter just a few weeks my body began to deteriorate. My feet and ankles started to swell\nand I was finding it very tiring to stand."]}, {"num": 78, "paragraphs": ["There were many skies. The sky was invaded by great white clouds, flat on the bottom\nbut round and billowy on top. The sky was completely cloudless, of a blue quite\nshattering to the senses. The sky was a heavy, suffocating blanket of grey cloud, but\nwithout promise of rain. The sky was thinly overcast. The sky was dappled with small,\nwhite, fleecy clouds. The sky was streaked with high, thin clouds that looked like a cotton\nball stretched apart. The sky was a featureless milky haze. The sky was a density of dark\nand blustery rain clouds that passed by without delivering rain. The sky was painted with\na small number of flat clouds that looked like sandbars. The sky was a mere block to\nallow a visual effect on the horizon: sunlight flooding the ocean, the vertical edges\nbetween light and shadow perfectly distinct. The sky was a distant black curtain of falling\nrain. The sky was many clouds at many levels, some thick and opaque, others looking\nlike smoke. The sky was black and spitting rain on my smiling face. The sky was nothing\nbut falling water, a ceaseless deluge that wrinkled and bloated my skin and froze me stiff.", "There were many seas. The sea roared like a tiger. The sea whispered in your ear like a\nfriend telling you secrets. The sea clinked like small change in a pocket. The sea\nthundered like avalanches. The sea hissed like sandpaper working on wood. The sea\nsounded like someone vomiting. The sea was dead silent.\nAnd in between the two, in between the sky and the sea, were all the winds.\nAnd there were all the nights and all the moons.\nTo be a castaway is to be a point perpetually at the centre of a circle. However much\nthings may appear to change—the sea may shift from whisper to rage, the sky might go\nfrom fresh blue to blinding white to darkest black—the geometry never changes. Your\ngaze is always a radius. The circumference is ever great. In fact, the circles multiply. To\nbe a castaway is to be caught in a harrowing ballet of circles. You are at the centre of one\ncircle, while above you two opposing circles spin about. The sun distresses you like a\ncrowd, a noisy, invasive crowd that makes you cup your ears, that makes you close your\neyes, that makes you want to hide. The moon distresses you by silently reminding you of\nyour solitude; you open your eyes wide to escape your loneliness. When you look up, you\nsometimes wonder if at the centre of a solar storm, if in the middle of the Sea of\nTranquillity, there isn't another one like you also looking up, also trapped by geometry,\nalso struggling with fear, rage, madness, hopelessness, apathy.\nOtherwise, to be a castaway is to be caught up in grim and exhausting opposites. When it\nis light, the openness of the sea is blinding and frightening. When it is dark, the darkness\nis claustrophobic. When it is day, you are hot and wish to be cool and dream of ice cream\nand pour sea water on yourself. When it is night you are cold and wish to be warm and\ndream of hot curries; and wrap yourself in blankets. When it is hot, you are parched and\nwish to be wet. When it rains, you are nearly drowned and wish to be dry. When there is\nfood, there is too much of it and you must feast. When there is none, there is truly none\nand you starve. When the sea is flat and motionless, you wish it would stir. When it rises\nup and the circle that imprisons you is broken by hills of water, you suffer that peculiarity\nof the high seas, suffocation in open spaces, and you wish the sea would be flat again.\nThe opposites often take place at the same moment, so that when the sun is scorching you\ntill you are stricken down, you are also aware that it is drying the strips of fish and meat\nthat are hanging from your lines and that it is a blessing for your solar stills. Conversely,\nwhen a rain squall is replenishing your fresh water supplies, you also know that the\nhumidity will affect your cured provisions and that some will probably go bad, turning\npasty and green. When rough weather abates, and it becomes clear that you have survived\nthe sky's attack and the sea's treachery, your jubilation is tempered by the rage that so\nmuch fresh water should fall directly into the sea and by the worry that it is the last rain\nyou will ever see, that you will die of thirst before the next drops fall.\nThe worst pair of opposites is boredom and terror. Sometimes your life is a pendulum\nswing from one to the other. The sea is without a wrinkle. There is not a whisper of wind.\nThe hours last forever. You are so bored you sink into a state of apathy close to a coma.", "Then the sea becomes rough and your emotions are whipped into a frenzy. Yet even these\ntwo opposites do not remain distinct. In your boredom there are elements of terror: you\nbreak down into tears; you are filled with dread; you scream; you deliberately hurt\nyourself And in the grip of terror—the worst storm—you yet feel boredom, a deep\nweariness with it all.\nOnly death consistently excites your emotions, whether contemplating it when life is safe\nand stale, or fleeing it when life is threatened and precious.\nLife on a lifeboat isn't much of a life. It is like an end game in chess, a game with few\npieces. The elements couldn't be more simple, nor the stakes higher. Physically it is\nextraordinarily arduous, and morally it is killing. You must make adjustments if you want\nto survive. Much becomes expendable. You get your happiness where you can. You\nreach a point where you're at the bottom of hell, yet you have your arms crossed and a\nsmile on your face, and you feel you're the luckiest person on earth. Why? Because at\nyour feet you have a tiny dead fish."]}, {"num": 79, "paragraphs": ["There were sharks every day, mainly makos and blue sharks, but also oceanic whitetips,\nand once a tiger shark straight from the blackest of nightmares. Dawn and dusk were their\nfavourite times. They never seriously troubled us. On occasion one knocked the hull of\nthe lifeboat with its tail. I don't think it was accidental (other marine life did it too, turtles\nand even dorados). I believe it was part of a shark's way of determining the nature of the\nlifeboat. A good whack on the offender's nose with a hatchet sent it vanishing post-haste\ninto the deep. The main nuisance of sharks was that they made being in the water risky,\nlike trespassing on a property where there's a sign saying Beware of Dog. Otherwise, I\ngrew quite fond of sharks. They were like curmudgeonly old friends who would never\nadmit that they liked me yet came round to see me all the time. The blue sharks were\nsmaller, usually no more than four or five feet long, and the most attractive, sleek and\nslender, with small mouths and discreet gill slits. Their backs were a rich ultramarine and\ntheir stomachs snow white, colours that vanished to grey or black when they were at any\ndepth, but which close to the surface sparkled with surprising brilliance. The makos were\nlarger and had mouths bursting with frightening teeth, but they too were nicely coloured,\nan indigo blue that shimmered beautifully in the sun. The oceanic whitetips were often\nshorter than the makos—some of which stretched to twelve feet—but they were much\nstockier and had enormous dorsal fins that they sailed high above the surface of the water,\nlike a war banner, a rapidly moving sight that was always nerve-racking to behold.\nBesides, they were a dull colour, a sort of greyish brown, and the mottled white tips of\ntheir fins held no special attraction.", "I caught a number of small sharks, blue sharks for the most part, but some makos too.\nEach time it was just after sunset, in the dying light of the day, and I caught them with\nmy bare hands as they came close to the lifeboat.\nThe first one was my largest, a mako over four feet long. It had come and gone near the\nbow several times. As it was passing by yet again, I impulsively dropped my hand into\nthe water and grabbed it just ahead of the tail, where its body was thinnest. Its harsh skin\nafforded such a marvellously good grip that without thinking about what I was doing, I\npulled. As I pulled, it jumped, giving my arm a terrific shake. To my horror and delight\nthe thing vaulted in the air in an explosion of water and spray. For the merest fraction of a\nsecond I didn't know what to do next. The thing was smaller than I—but wasn't I being a\nfoolhardy Goliath here? Shouldn't I let go? I turned and swung, and falling on the\ntarpaulin, I threw the mako towards the stern. The fish fell from the sky into Richard\nParker's territory. It landed with a crash and started thwacking about with such thunder\nthat I was afraid it would demolish the boat. Richard Parker was startled. He attacked\nimmediately.\nAn epic battle began. Of interest to zoologists I can report the following: a tiger will not\nat first attack a shark out of water with its jaws but will rather strike at it with its\nforepaws. Richard Parker started clubbing the shark. I shuddered at every blow. They\nwere simply terrible. Just one delivered to a human would break every bone, would turn\nany piece of furniture into splinters, would reduce an entire house into a pile of rubble.\nThat the mako was not enjoying the treatment was evident from the way it was twisting\nand turning and beating its tail and reaching with its mouth.\nPerhaps it was because Richard Parker was not familiar with sharks, had never\nencountered a predatory fish—whatever the case, it happened: an accident, one of those\nfew times when I was reminded that Richard Parker was not perfect, that despite his\nhoned instincts he too could bumble. He put his left paw into the mako's mouth. The\nmako closed its jaws. Immediately Richard Parker reared onto his back legs. The shark\nwas jerked up, but it wouldn't let go. Richard Parker fell back down, opened his mouth\nwide and full-out roared. I felt a blast of hot air against my body. The air visibly shook,\nlike the heat coming off a road on a hot day. I can well imagine that somewhere far off,\n150 miles away, a ship's watch looked up, startled, and later reported the oddest thing,\nthat he thought he heard a cat's meow coming from three o'clock. Days later that roar was\nstill ringing in my guts. But a shark is deaf, conventionally speaking. So while I, who\nwouldn't think of pinching a tiger's paw, let alone of trying to swallow one, received a\nvolcanic roar full in the face and quaked and trembled and turned liquid with fear and\ncollapsed, the shark perceived only a dull vibration.\nRichard Parker turned and started clawing the shark's head with his free front paw and\nbiting it with his jaws, while his rear legs began tearing at its stomach and back. The\nshark held on to his paw, its only line of defence and attack, and thrashed its tail. Tiger\nand shark twisted and tumbled about. With great effort I managed to gain enough control\nof my body to get onto the raft and release it. The lifeboat drifted away. I saw flashes of", "orange and deep blue, of fur and skin, as the lifeboat rocked from side to side. Richard\nParker's snarling was simply terrifying.\nAt last the boat stopped moving. After several minutes Richard Parker sat up, licking his\nleft paw.\nIn the following days he spent much time tending his four paws. A shark's skin is covered\nwith minute tubercles that make it as rough as sandpaper. He had no doubt cut himself\nwhile repeatedly raking the shark. His left paw was injured, but the damage did not seem\npermanent; no toes or claws were missing. As for the mako, except for the tips of the tail\nand the mouth area, incongruously untouched, it was a half-eaten, butchered mess.\nChunks of reddish grey flesh and clumps of internal organs were strewn about.\nI managed to gaff some of the shark's remains, but to my disappointment the vertebrae of\nsharks do not hold fluid. At least the flesh was tasty and unfishy, and the crunchiness of\ncartilage was a welcome respite from so much soft food.\nSubsequently I went for smaller sharks, pups really, and I killed them myself. I found that\nstabbing them through the eyes with the knife was a faster, less tiresome way of killing\nthem than hacking at the tops of their heads with the hatchet."]}, {"num": 80, "paragraphs": ["Of all the dorados, I remember one in particular, a special dorado. It was early morning\non a cloudy day, and we were in the midst of a storm of flying fish. Richard Parker was\nactively swatting at them. I was huddled behind a turtle shell, shielding myself from the\nflying fish. I had a gaff with a piece of net hanging from it extended into the open. I was\nhoping to catch fish in this way. I wasn't having much luck. A flying fish whizzed by.\nThe dorado that was chasing it burst out of the water. It was a bad calculation. The\nanxious flying fish got away, just missing my net, but the dorado hit the gunnel like a\ncannonball. The thud it made shook the whole boat. A spurt of blood sprayed the\ntarpaulin. I reacted quickly. I dropped beneath the hail of flying fish and reached for the\ndorado just ahead of a shark. I pulled it aboard. It was dead, or nearly there, and turning\nall kinds of colours. What a catch! What a catch! I thought excitedly. Thanks be to you,\nJesus-Matsya. The fish was fat and fleshy. It must have weighed a good forty pounds. It\nwould feed a horde. Its eyes and spine would irrigate a desert.\nAlas, Richard Parker's great head had turned my way. I sensed it from the corner of my\neyes. The flying fish were still coming, but he was no longer interested in them; it was\nthe fish in my hands that was now the focus of his attention. He was eight feet away. His\nmouth was half open, a fish wing dangling from it. His back became rounder. His rump\nwriggled. His tail twitched. It was clear: he was in a crouch and he was making to attack\nme. It was too late to get away, too late even to blow my whistle. My time had come.", "But enough was enough. I had suffered so much. I was so hungry. There are only so\nmany days you can go without eating.\nAnd so, in a moment of insanity brought on by hunger—because I was more set on eating\nthan I was on staying alive—without any means of defence, naked in every sense of the\nterm, I looked Richard Parker dead in the eyes. Suddenly his brute strength meant only\nmoral weakness. It was nothing compared to the strength in my mind. I stared into his\neyes, wide-eyed and defiant, and we faced off. Any zookeeper will tell you that a tiger,\nindeed any cat, will not attack in the face of a direct stare but will wait until the deer or\nantelope or wild ox has turned its eyes. But to know that and to apply it are two very\ndifferent things (and it's a useless bit of knowledge if you're hoping to stare down a\ngregarious cat. While you hold one lion in the thrall of your gaze, another will come up to\nyou from behind). For two, perhaps three seconds, a terrific battle of minds for status and\nauthority was waged between a boy and a tiger. He needed to make only the shortest of\nlunges to be on top of me. But I held my stare.\nRichard Parker licked his nose, groaned and turned away. He angrily batted a flying fish.\nI had won. I gasped with disbelief, heaved the dorado into my hands and hurried away to\nthe raft. Shortly thereafter, I delivered to Richard Parker a fair chunk of the fish.\nFrom that day onwards I felt my mastery was no longer in question, and I began to spend\nprogressively more time on the lifeboat, first at the bow, then, as I gained confidence, on\nthe more comfortable tarpaulin. I was still scared of Richard Parker, but only when it was\nnecessary. His simple presence no longer strained me. You can get used to anything—\nhaven't I already said that? Isn't that what all survivors say?\nInitially I lay on the tarpaulin with my head against its rolled-up bow edge. It was raised a\nlittle—since the ends of the lifeboat were higher than its middle—and so I could keep an\neye on Richard Parker.\nLater on I turned the other way, with my head resting just above the middle bench, my\nback to Richard Parker and his territory. In this position I was further away from the\nedges of the boat and less exposed to wind and spray."]}, {"num": 81, "paragraphs": ["I know my survival is hard to believe. When I think back, I can hardly believe it myself.\nMy crude exploitation of Richard Parker's weak sea legs is not the only explanation.\nThere is another: I was the source of food and water. Richard Parker had been a zoo\nanimal as long as he could remember, and he was used to sustenance coming to him\nwithout his lifting a paw. True, when it rained and the whole boat became a rain catcher,", "he understood where the water came from. And when we were hit by a school of flying\nfish, there too my role was not apparent. But these events did not change the reality of\nthings, which was that when he looked beyond the gunnel, he saw no jungle that he could\nhunt in and no river from which he could drink freely. Yet I brought him food and I\nbrought him fresh water. My agency was pure and miraculous. It conferred power upon\nme. Proof: I remained alive day after day, week after week. Proof: he did not attack me,\neven when I was asleep on the tarpaulin. Proof: I am here to tell you this story."]}];

let selectedChapters = new Set();
let currentChId = null;
let notes = JSON.parse(localStorage.getItem('lop-notes-v3') || '[]');

let selParaText = '';
let mode = 'both';

      <div class="leg"><div class="ld i"></div>俚语</div>
      <div class="leg"><div class="ld c"></div>文化背景</div>
      <div style="margin-left:auto;font-size:.66rem;color:var(--text3)">点高亮词查注释 · 点段落记笔记</div>
    </div>

    <div class="review-box">
      <div class="rb-head"><h3>✍️ AI书评</h3><button class="ghost-btn" onclick="genReview(${num})" id="rvBtn">生成书评</button></div>
      <div class="rb-body" id="rvBody"><span class="rb-ph">添加笔记后点击生成...</span></div>
    </div>`;

  document.querySelectorAll('.an').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const a=annotations[el.dataset.w];
      if(a) showPopup(el,a);
    });
  });
}

// ── BATCH PROCESS ──
async function batchProcess(){
  const toProcess=[...selectedChapters].filter(n=>!cache['ch'+n]);
  if(!toProcess.length){alert('选中章节已全部处理！');return;}
  if(isProcessing) return;
  isProcessing=true;
  const btn=document.getElementById('procBtn');
  btn.disabled=true;
  let done=0;
  for(const num of toProcess){
    const el=document.getElementById('chi-'+num);
    if(el) el.classList.add('processing');
    btn.textContent=`处理中 ${++done}/${toProcess.length}...`;
    const ch=BOOK_DATA.find(c=>c.num===num);
    if(!ch) continue;
    const chunks=chunkParas(ch.paragraphs,500);
    let all=[];
    for(const chunk of chunks){
      try{all.push(...await processChunk(chunk));await sleep(350);}
      catch(e){chunk.forEach(p=>all.push({en:p,zh:'（翻译失败）',annotations:[]}));}
    }
    cache['ch'+num]=all;
    localStorage.setItem('lop-cache-v3',JSON.stringify(cache));
    if(el){el.classList.remove('processing');el.classList.add('cached');}
    updateProgress();
    if(currentChId===num) renderChapter(num);
  }
  isProcessing=false;btn.disabled=false;btn.textContent='⚡ 处理选中章节';
  updateBatchInfo();
}

async function quickProcess(num){
  selectedChapters.add(num);
  const c=document.getElementById('chk-'+num);
  if(c) c.checked=true;
  await batchProcess();
}

function chunkParas(paras,maxW){
  const chunks=[];let cur=[],wc=0;
  for(const p of paras){
    const w=p.split(/\s+/).length;
    if(wc+w>maxW&&cur.length){chunks.push(cur);cur=[];wc=0;}
    cur.push(p);wc+=w;
  }
  if(cur.length) chunks.push(cur);
  return chunks;
}

async function processChunk(paras){
  const r=await fetch("https://corsproxy.io/?url=https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:`You are a bilingual literary assistant for "Life of Pi" by Yann Martel (chapters 58–81: Pi's survival at sea with Bengal tiger Richard Parker).
Return ONLY valid JSON (no markdown, no backticks):
{"paragraphs":[{"en":"original text","zh":"elegant literary Chinese","annotations":[{"word":"exact phrase","type":"vocab|idiom|culture","meaning":"Chinese explanation","example":"usage note"}]}]}
Rules: one object per paragraph, preserve order. Chinese style: elegant, literary (李继宏译本风格). Annotate 1-3 items per paragraph max. type vocab=difficult words, idiom=expressions, culture=religious/cultural refs (Pi has many Hindu/Christian/Muslim references).`,
      messages:[{role:"user",content:paras.join('\n\n')}]
    })
  });
  const d=await r.json();
  const raw=d.content.map(i=>i.text||'').join('');
  return JSON.parse(raw.replace(/```json|```/g,'').trim()).paragraphs;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// ── ANNOTATE ──
function annotateText(text,anns){
  if(!anns||!anns.length) return text;
  let r=text;
  [...anns].sort((a,b)=>b.word.length-a.word.length).forEach(a=>{
    const esc=a.word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const cls=a.type==='vocab'?'v':a.type==='idiom'?'i':'c';
    r=r.replace(new RegExp(`(?<![\\w])(${esc})(?![\\w])`,'g'),
      `<span class="an ${cls}" data-w="${escQ(a.word)}">$1</span>`);
  });
  return r;
}
function escQ(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// ── POPUP ──
function showPopup(el,a){
  const pop=document.getElementById('popup');
  document.getElementById('pw').textContent=a.word;
  const pt=document.getElementById('pt');
  pt.textContent={vocab:'生词',idiom:'俚语/俗语',culture:'文化背景'}[a.type]||a.type;
  pt.className='pt '+(a.type==='vocab'?'v':a.type==='idiom'?'i':'c');
  document.getElementById('pm').textContent=a.meaning;
  document.getElementById('pe').textContent=a.example||'';
  const rect=el.getBoundingClientRect();
  let top=rect.bottom+8,left=rect.left;
  if(left+295>window.innerWidth) left=window.innerWidth-301;
  if(top+175>window.innerHeight) top=rect.top-183;
  pop.style.top=top+'px';pop.style.left=left+'px';
  pop.classList.add('show');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.popup')&&!e.target.closest('.an'))
    document.getElementById('popup').classList.remove('show');
});

// ── NOTES ──
function selectPara(el,quote){
  document.querySelectorAll('.para-pair').forEach(p=>p.classList.remove('sel'));
  el.classList.add('sel');selParaText=quote;
  document.getElementById('nfQ').textContent='"'+quote.slice(0,65)+(quote.length>65?'…':'"');
  document.getElementById('nfTa').value='';
  document.getElementById('nf').classList.add('show');
  document.getElementById('nfTa').focus();
}
function closeNF(){document.getElementById('nf').classList.remove('show');document.querySelectorAll('.para-pair').forEach(p=>p.classList.remove('sel'));}
function saveNote(){
  const t=document.getElementById('nfTa').value.trim();if(!t) return;
  notes.push({quote:selParaText.slice(0,100),text:t,chNum:currentChId,time:new Date().toLocaleDateString('zh-CN')});
  localStorage.setItem('lop-notes-v3',JSON.stringify(notes));
  closeNF();renderNotes();
}
function deleteNote(i){notes.splice(i,1);localStorage.setItem('lop-notes-v3',JSON.stringify(notes));renderNotes();}
function renderNotes(){
  const list=document.getElementById('notesList');
  document.getElementById('noteCnt').textContent=notes.length?`(${notes.length})`:'';
  if(!notes.length){list.innerHTML='<p style="font-size:.7rem;color:var(--text3);font-style:italic;padding:4px 0">还没有笔记</p>';return;}
  list.innerHTML=notes.map((n,i)=>`
    <div class="note-card">
      <button class="nc-del" onclick="deleteNote(${i})">✕</button>
      <div class="nc-q">"${n.quote.slice(0,55)}…"</div>
      <div class="nc-t">${n.text}</div>
      <div style="font-size:.6rem;color:var(--text3);margin-top:4px">Ch.${n.chNum} · ${n.time}</div>
    </div>`).join('');
}

// ── REVIEW ──
async function genReview(num){
  const btn=document.getElementById('rvBtn'),body=document.getElementById('rvBody');
  btn.disabled=true;btn.textContent='生成中...';
  body.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  const chNotes=notes.filter(n=>n.chNum===num);
  const sample=(cache['ch'+num]||[]).slice(0,3).map(p=>p.en).join('\n\n');
  const noteTxt=chNotes.length?chNotes.map(n=>`"${n.quote}" — ${n.text}`).join('\n')
    : notes.length?notes.slice(0,4).map(n=>`[Ch.${n.chNum}] "${n.quote}" — ${n.text}`).join('\n'):'';
  try{
    const r=await fetch("https://corsproxy.io/?url=https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:'你是文学书评人。根据《少年Pi的奇幻漂流》第58-81章（Pi在太平洋上与老虎Richard Parker共存求生的段落）和读书笔记，写250-350字个性化书评。风格：豆瓣高分书评，有文学感，有个人见解，可引用原文。',
        messages:[{role:"user",content:`章节：${num}\n\n摘录：\n${sample}\n\n笔记：\n${noteTxt||'（暂无笔记）'}`}]
      })
    });
    const d=await r.json();
    body.innerHTML=d.content.map(i=>i.text||'').join('').replace(/\n/g,'<br>');
  }catch(e){body.innerHTML='<span class="rb-ph">生成失败，请重试</span>';}
  btn.disabled=false;btn.textContent='重新生成';
}

function clearAndReprocess(){
  if(!confirm('清除所有缓存并重新处理选中章节？')) return;
  cache={};
  localStorage.removeItem('lop-cache-v3');
  // Mark all as uncached in UI
  document.querySelectorAll('.ch-item').forEach(el=>el.classList.remove('cached'));
  updateProgress();
  updateBatchInfo();
  // If currently viewing a chapter, re-render it (will show unprocessed state)
  if(currentChId) renderChapter(currentChId);
  // Now trigger batch process on selected chapters
  if(selectedChapters.size>0) batchProcess();
  else alert('缓存已清除！请勾选章节后点击处理。');
}


// ── BOOKMARK / QUOTE CARD ──
let bmText = '';
let bmStyle = 'dark';
let bmSelectedEl = null;

const BM_STYLES = {
  dark: {
    bg: '#0f0e0b', bg2: '#1a1714', accent: '#c8a96e', text: '#e8e0d0',
    sub: '#7a6a50', border: 'rgba(200,169,110,0.3)', grain: true
  },
  warm: {
    bg: '#f5ede0', bg2: '#ede0cc', accent: '#8a5a20', text: '#2a1a0a',
    sub: '#8a7060', border: 'rgba(138,90,32,0.25)', grain: true
  },
  ocean: {
    bg: '#0a1a2a', bg2: '#0f2235', accent: '#4a9ab8', text: '#d0e8f0',
    sub: '#5a8090', border: 'rgba(74,154,184,0.3)', grain: false
  },
  minimal: {
    bg: '#ffffff', bg2: '#f5f5f5', accent: '#1a1a1a', text: '#1a1a1a',
    sub: '#888888', border: 'rgba(0,0,0,0.1)', grain: false
  }
};

function setBMStyle(style, btn) {
  bmStyle = style;
  document.querySelectorAll('.bm-style-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderBMCanvas();
}

function makeBookmark() {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  bmText = sel.toString().trim();
  if (bmText.length < 5) return;
  document.getElementById('selToolbar').classList.remove('show');
  document.getElementById('bmOverlay').classList.add('show');
  renderBMCanvas();
}

function highlightSelection() {
  // Simple visual highlight via range
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  try {
    const range = sel.getRangeAt(0);
    const mark = document.createElement('mark');
    mark.style.cssText = 'background:rgba(200,169,110,0.3);border-radius:2px;padding:0 1px;';
    range.surroundContents(mark);
    sel.removeAllRanges();
  } catch(e) {}
  document.getElementById('selToolbar').classList.remove('show');
}

function renderBMCanvas() {
  const canvas = document.getElementById('bmCanvas');
  const ctx = canvas.getContext('2d');
  const s = BM_STYLES[bmStyle];
  const W = 800, H = 500;
  canvas.width = W; canvas.height = H;

  // Background
  ctx.fillStyle = s.bg;
  ctx.fillRect(0, 0, W, H);

  // Grain texture
  if (s.grain) {
    for (let i = 0; i < 8000; i++) {
      ctx.fillStyle = `rgba(${bmStyle==='warm'?'80,40,0':'200,180,140'},${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*W, Math.random()*H, 1, 1);
    }
  }

  // Left accent bar
  const barGrad = ctx.createLinearGradient(0, 80, 0, H-80);
  barGrad.addColorStop(0, s.accent + '00');
  barGrad.addColorStop(0.3, s.accent);
  barGrad.addColorStop(0.7, s.accent);
  barGrad.addColorStop(1, s.accent + '00');
  ctx.fillStyle = barGrad;
  ctx.fillRect(52, 80, 2, H-160);

  // Opening quote mark
  ctx.font = 'italic 80px Georgia, serif';
  ctx.fillStyle = s.accent;
  ctx.globalAlpha = 0.18;
  ctx.fillText('\u201C', 56, 140);
  ctx.globalAlpha = 1;

  // Quote text - wrap
  const maxW = W - 170;
  const fontSize = bmText.length > 200 ? 18 : bmText.length > 120 ? 21 : 24;
  ctx.font = `${fontSize}px 'EB Garamond', Georgia, serif`;
  ctx.fillStyle = s.text;
  ctx.globalAlpha = 0.95;

  const words = bmText.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);

  // Limit lines
  const maxLines = Math.floor((H - 200) / (fontSize * 1.65));
  const displayLines = lines.slice(0, maxLines);
  if (lines.length > maxLines) displayLines[maxLines-1] += '…';

  const totalH = displayLines.length * fontSize * 1.65;
  const startY = (H - totalH) / 2 + fontSize;

  displayLines.forEach((l, i) => {
    ctx.fillText(l, 88, startY + i * fontSize * 1.65);
  });
  ctx.globalAlpha = 1;

  // Bottom: book info
  ctx.fillStyle = s.sub;
  ctx.font = `13px 'Noto Sans SC', sans-serif`;
  const chInfo = currentChId ? `Chapter ${currentChId}` : '';
  ctx.fillText('Life of Pi  ·  Yann Martel  ' + (chInfo ? '·  ' + chInfo : ''), 88, H - 52);

  // Small decorative dots
  ctx.fillStyle = s.accent;
  ctx.globalAlpha = 0.5;
  [W-80, W-65, W-50].forEach(x => {
    ctx.beginPath();
    ctx.arc(x, H-52, 2, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function downloadBM() {
  const canvas = document.getElementById('bmCanvas');
  const link = document.createElement('a');
  link.download = `LifeOfPi_Ch${currentChId||''}_quote.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function closeBM(e) {
  if (e && e.target !== document.getElementById('bmOverlay')) return;
  document.getElementById('bmOverlay').classList.remove('show');
}

// ── TEXT SELECTION TOOLBAR ──
document.addEventListener('mouseup', e => {
  const toolbar = document.getElementById('selToolbar');
  // Small delay to let selection settle
  setTimeout(() => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim().length < 3) {
      toolbar.classList.remove('show');
      return;
    }
    // Only show inside reader
    const node = sel.anchorNode;
    if (!node) return;
    const parent = node.parentElement;
    if (!parent || !parent.closest('.p-en, .p-zh')) {
      toolbar.classList.remove('show');
      return;
    }
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    let left = rect.left + rect.width/2 - 80;
    let top = rect.top - 44 + window.scrollY;
    if (left < 8) left = 8;
    if (left + 200 > window.innerWidth) left = window.innerWidth - 208;
    toolbar.style.left = left + 'px';
    toolbar.style.top = top + 'px';
    toolbar.classList.add('show');
  }, 10);
});

document.addEventListener('mousedown', e => {
  if (!e.target.closest('.sel-toolbar')) {
    document.getElementById('selToolbar').classList.remove('show');
  }
});


init();
